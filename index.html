<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lilie — 神業を資産に変える</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --blush: #E8C9BB;
    --rose: #C4856A;
    --deep: #2A1F1A;
    --muted: #8A7570;
    --sage: #8FA896;
    --gold: #C9A96E;
    --surface: #FFFFFF;
    --border: rgba(42,31,26,0.08);
    --shadow: 0 2px 24px rgba(42,31,26,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--deep);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    position: fixed; top: 0; left: 0;
    width: 260px; height: 100vh;
    background: var(--deep);
    display: flex; flex-direction: column;
    z-index: 100;
    padding: 32px 0;
  }

  .sidebar-logo {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px; font-weight: 700;
    color: var(--blush);
    padding: 0 28px 32px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    letter-spacing: 0.04em;
  }
  .sidebar-logo span { color: var(--gold); }

  .sidebar-nav { flex: 1; padding: 24px 0; overflow-y: auto; }

  .phase-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--rose); padding: 6px 16px 6px 28px;
    margin-top: 16px; margin-bottom: 2px;
    border-top: 1px solid rgba(196,133,106,0.2);
    display: flex; align-items: center; gap: 6px;
  }
  .phase-label::before {
    content: ''; display: inline-block;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--rose); flex-shrink: 0;
  }
  .phase-label:first-child { border-top: none; margin-top: 4px; }

  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 28px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .nav-item:hover { background: rgba(255,255,255,0.04); }
  .nav-item.active { background: rgba(196,133,106,0.15); }
  .nav-item.active::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--rose);
    border-radius: 0 2px 2px 0;
  }

  .nav-dot {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600;
    flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.3);
    transition: all 0.2s;
  }
  .nav-item.done .nav-dot {
    background: var(--sage); border-color: var(--sage); color: white;
  }
  .nav-item.active .nav-dot {
    background: var(--rose); border-color: var(--rose); color: white;
  }

  .nav-text { font-size: 12.5px; color: rgba(255,255,255,0.5); font-weight: 400; line-height: 1.4; }
  .nav-item.active .nav-text { color: rgba(255,255,255,0.9); font-weight: 500; }
  .nav-item.done .nav-text { color: rgba(255,255,255,0.6); }

  .sidebar-footer {
    padding: 20px 28px 0;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .progress-bar-wrap { margin-top: 12px; }
  .progress-bar-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progress-bar-track { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--rose), var(--gold)); border-radius: 2px; transition: width 0.6s ease; }

  /* ── MAIN ── */
  .main {
    margin-left: 260px;
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    padding: 32px 48px 0;
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  .breadcrumb { font-size: 12px; color: var(--muted); letter-spacing: 0.06em; }
  .breadcrumb span { color: var(--rose); }

  /* ── CONTENT AREA ── */
  .content { padding: 24px 48px 60px; flex: 1; }

  /* ── STEP CARD ── */
  .step-card {
    background: var(--surface);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
    max-width: 780px;
  }

  .step-header {
    padding: 36px 40px 28px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 20px; align-items: flex-start;
  }
  .step-number {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, var(--rose), var(--blush));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: white;
    flex-shrink: 0;
    font-family: 'Shippori Mincho', serif;
  }
  .step-title-wrap { flex: 1; }
  .step-week { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--rose); margin-bottom: 6px; }
  .step-title { font-family: 'Shippori Mincho', serif; font-size: 20px; font-weight: 700; color: var(--deep); line-height: 1.4; }
  .step-time { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .step-body { padding: 32px 40px; }

  .purpose-box {
    background: linear-gradient(135deg, #FFF8F5, #FFF3EC);
    border: 1px solid rgba(196,133,106,0.2);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 28px;
  }
  .purpose-box p { font-size: 14px; line-height: 1.8; color: var(--deep); }
  .purpose-box strong { color: var(--rose); }

  /* ── FORM ELEMENTS ── */
  .field-group { margin-bottom: 24px; }
  .field-label {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 500; color: var(--deep);
    margin-bottom: 10px;
  }
  .field-label .badge {
    font-size: 9px; padding: 2px 8px; border-radius: 20px;
    font-weight: 600; letter-spacing: 0.06em;
  }
  .badge-required { background: #FDE8E0; color: var(--rose); }
  .badge-hint { background: #E8F0EC; color: var(--sage); }

  .hint-text { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 8px; font-style: italic; }

  textarea, input[type="text"] {
    width: 100%; border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--deep);
    background: #FDFCFA;
    resize: vertical; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.7;
  }
  textarea:focus, input[type="text"]:focus {
    border-color: var(--rose);
    box-shadow: 0 0 0 4px rgba(196,133,106,0.1);
    background: white;
  }
  textarea { min-height: 90px; }

  /* ── AI RESPONSE AREA ── */
  .ai-section {
    margin-top: 28px;
    border-top: 1px solid var(--border);
    padding-top: 24px;
  }
  .ai-trigger-btn {
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, var(--rose), #D4906E);
    color: white; border: none;
    padding: 14px 28px; border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .ai-trigger-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(196,133,106,0.35); }
  .ai-trigger-btn:active { transform: translateY(0); }
  .ai-trigger-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-icon { font-size: 16px; }

  .ai-response-wrap {
    margin-top: 20px;
    background: linear-gradient(135deg, #F8F4F0, #FAF7F2);
    border: 1px solid rgba(196,133,106,0.15);
    border-radius: 14px;
    overflow: hidden;
    display: none;
  }
  .ai-response-wrap.visible { display: block; }

  .ai-response-header {
    padding: 14px 20px;
    background: rgba(196,133,106,0.08);
    border-bottom: 1px solid rgba(196,133,106,0.12);
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 500; color: var(--rose);
  }
  .ai-avatar {
    width: 20px; height: 20px; border-radius: 50%;
    background: linear-gradient(135deg, var(--rose), var(--blush));
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: white;
  }

  .ai-response-body {
    padding: 20px;
    font-size: 14px; line-height: 1.9; color: var(--deep);
    white-space: pre-wrap;
    min-height: 60px;
  }

  .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rose); animation: typing 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%,60%,100%{opacity:0.2;transform:scale(1)} 30%{opacity:1;transform:scale(1.2)} }

  /* ── SAVED DATA PILLS ── */
  .saved-data {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 20px;
  }
  .saved-pill {
    display: flex; align-items: center; gap: 6px;
    background: #EFF5F1; border: 1px solid rgba(143,168,150,0.3);
    border-radius: 20px; padding: 5px 12px;
    font-size: 12px; color: #5A7A63; font-weight: 500;
  }
  .saved-pill .pill-icon { font-size: 13px; }
  .saved-block {
    width: 100%; background: #EFF5F1; border: 1px solid rgba(143,168,150,0.3);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 4px;
    font-size: 13px; color: #2A1F1A; line-height: 1.8; white-space: pre-wrap;
  }
  .saved-block-label {
    font-size: 11px; color: #5A7A63; font-weight: 600; margin-bottom: 6px;
    display: flex; align-items: center; gap: 4px;
  }

  /* ── NAVIGATION BUTTONS ── */
  .step-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 24px 40px;
    border-top: 1px solid var(--border);
    background: #FDFCFA;
  }
  .btn-prev, .btn-next {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 24px; border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; border: none;
  }
  .btn-prev { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
  .btn-prev:hover { border-color: var(--rose); color: var(--rose); }
  .btn-next { background: var(--deep); color: white; }
  .btn-next:hover { background: #3D2E28; transform: translateX(2px); }
  .btn-next.primary { background: linear-gradient(135deg, var(--rose), #D4906E); }

  /* ── COMPLETION STATE ── */
  .completion-card {
    max-width: 580px; margin: 60px auto;
    text-align: center; padding: 60px 40px;
    background: var(--surface); border-radius: 24px;
    border: 1px solid var(--border); box-shadow: var(--shadow);
  }
  .completion-icon { font-size: 52px; margin-bottom: 20px; }
  .completion-title { font-family: 'Shippori Mincho', serif; font-size: 26px; font-weight: 700; color: var(--deep); margin-bottom: 12px; }
  .completion-body { font-size: 15px; color: var(--muted); line-height: 1.8; }

  /* ── WEEK INTRO ── */
  .week-intro {
    max-width: 780px; margin-bottom: 28px;
    padding: 28px 36px;
    background: var(--surface); border-radius: 16px;
    border: 1px solid var(--border);
    display: flex; gap: 20px; align-items: flex-start;
  }
  .week-intro-icon { font-size: 32px; flex-shrink: 0; }
  .week-intro-text h2 {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px; font-weight: 700; color: var(--deep); margin-bottom: 6px;
  }
  .week-intro-text p { font-size: 13.5px; color: var(--muted); line-height: 1.7; }

  /* ── RADIO OPTIONS ── */
  .radio-group { display: flex; flex-direction: column; gap: 10px; }
  .radio-option {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px; border-radius: 10px;
    border: 1.5px solid var(--border);
    cursor: pointer; transition: all 0.2s;
    background: #FDFCFA;
  }
  .radio-option:hover { border-color: var(--rose); background: #FFF8F5; }
  .radio-option.selected { border-color: var(--rose); background: #FFF3ED; }
  .radio-option input { display: none; }
  .radio-custom {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .radio-option.selected .radio-custom {
    border-color: var(--rose); background: var(--rose);
  }
  .radio-option.selected .radio-custom::after {
    content: ''; width: 6px; height: 6px;
    border-radius: 50%; background: white;
    display: block;
  }
  .radio-label { font-size: 14px; color: var(--deep); line-height: 1.5; }
  .radio-label small { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* fade in */
  .fade-in { animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(42,31,26,0.12); border-radius: 3px; }
  /* ── 再開モーダル ── */
  .resume-overlay {
    position: fixed; inset: 0; background: rgba(42,31,26,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; backdrop-filter: blur(4px);
  }
  .resume-modal {
    background: var(--surface); border-radius: 20px;
    padding: 36px 32px; width: 340px; max-width: 90vw;
    box-shadow: 0 8px 40px rgba(42,31,26,0.2); text-align: center;
  }
  .resume-modal h2 { font-size: 18px; color: var(--deep); margin-bottom: 8px; }
  .resume-modal p { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
  .resume-modal .btn-row { display: flex; gap: 10px; }
  .resume-modal .btn-resume {
    flex: 1; padding: 12px; background: var(--rose); color: white;
    border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
  }
  .resume-modal .btn-resume:hover { opacity: 0.85; }
  .resume-modal .btn-restart {
    flex: 1; padding: 12px; background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px; font-size: 14px;
    cursor: pointer; transition: all 0.2s;
  }
  .resume-modal .btn-restart:hover { border-color: var(--muted); color: var(--deep); }

  /* ── パスワードモーダル ── */
  .pw-overlay {
    position: fixed; inset: 0; background: rgba(42,31,26,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; backdrop-filter: blur(4px);
  }
  .pw-modal {
    background: var(--surface); border-radius: 20px;
    padding: 40px 36px; width: 360px; max-width: 90vw;
    box-shadow: 0 8px 40px rgba(42,31,26,0.2); text-align: center;
  }
  .pw-modal h2 { font-size: 20px; color: var(--deep); margin-bottom: 8px; }
  .pw-modal p { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
  .pw-modal input {
    width: 100%; padding: 12px 16px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 15px; margin-bottom: 8px;
    box-sizing: border-box; text-align: center; letter-spacing: 0.05em;
  }
  .pw-modal input:focus { outline: none; border-color: var(--rose); }
  .pw-modal .pw-error { font-size: 12px; color: #c0392b; margin-bottom: 12px; min-height: 18px; }
  .pw-modal button {
    width: 100%; padding: 13px; background: var(--rose); color: white;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
  }
  .pw-modal button:hover { opacity: 0.85; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-logo">Lilie <span>✦</span></div>
  <div class="sidebar-nav" id="sidebarNav"></div>
  <div class="sidebar-footer">
    <div class="progress-bar-label">
      <span style="color:rgba(255,255,255,0.4);font-size:11px;">全体の進捗</span>
      <span id="progressLabel" style="color:var(--gold);font-size:11px;">0%</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
  </div>
</nav>

<!-- MAIN -->
<main class="main">
  <div class="header">
    <div class="breadcrumb" id="breadcrumb">フェーズ1：設計 <span>›</span> Week 1</div>
  </div>
  <div class="content" id="mainContent"></div>
</main>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AUTH
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const COURSE_PASSWORD = 'LilieBasic03202348';
const WEEK1_STEP_COUNT = 4; // Week1はインデックス0〜3

function isAuthenticated() {
  return localStorage.getItem('lilie_auth') === '1';
}

function showPasswordModal(onSuccess) {
  const overlay = document.createElement('div');
  overlay.className = 'pw-overlay';
  overlay.innerHTML = `
    <div class="pw-modal">
      <h2>本講座へようこそ</h2>
      <p>Week 2以降は本講座受講生限定のコンテンツです。<br>受講時にお伝えしたアクセスコードを入力してください。</p>
      <input type="password" id="pwInput" placeholder="アクセスコード" autocomplete="off">
      <div class="pw-error" id="pwError"></div>
      <button onclick="submitPassword()">進む</button>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('pwInput').focus();
  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitPassword();
  });
  window._pwOnSuccess = onSuccess;
}

function submitPassword() {
  const val = document.getElementById('pwInput').value;
  if (val === COURSE_PASSWORD) {
    localStorage.setItem('lilie_auth', '1');
    document.querySelector('.pw-overlay').remove();
    window._pwOnSuccess && window._pwOnSuccess();
  } else {
    document.getElementById('pwError').textContent = 'アクセスコードが正しくありません';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

function requireAuth(targetIndex, onSuccess) {
  if (targetIndex < WEEK1_STEP_COUNT || isAuthenticated()) {
    onSuccess();
  } else {
    showPasswordModal(onSuccess);
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const state = {
  currentStep: 0,
  answers: {},
  aiResponses: {},
  completedSteps: new Set()
};

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CURRICULUM STRUCTURE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const steps = [
  // ── WEEK 1 ──
  {
    id: 'w1-intro', week: 1, phase: 'フェーズ1：設計',
    navLabel: '講座の準備',
    type: 'intro',
    icon: '🌸',
    title: 'Week 1：あなただけの「勝ち位置」を見つける',
    body: `このWeekでは、AIとの壁打ちを通じて、あなたの経験・感覚・失敗談を言葉にします。\n\n「ただのヨガ講師」「普通のネイリスト」ではなく、あなたにしか作れない<strong>「職業 × 強み」の掛け算</strong>でコンセプトを決定します。\n\nここで作る言葉が、Week2のカリキュラム設計・Week3の商品設計・Week9のLPまで、すべての土台になります。\n\n<strong>⚠️ 入力内容の保存について</strong>\n入力内容はこのブラウザに自動保存されます。次回アクセス時に続きから再開できます。\nただし、<strong>別のスマホ・PCや、別のブラウザからはデータは引き継がれません。</strong>最初から使うデバイス・ブラウザで作業を進めてください。`,

// RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  let currentWeek = null;
  let html = '';

  steps.forEach((step, i) => {
    const weekKey = step.week ?? step.phase ?? null;
    if (weekKey !== currentWeek) {
      currentWeek = weekKey;
      const phaseLabel = step.week === 1 ? 'Week 1 — 強みの発掘'
        : step.week === 2 ? 'Week 2 — ロードマップ'
        : step.week === 3 ? 'Week 3 — オファー設計'
        : step.week === 4 ? 'Week 4 — Utage実装'
        : step.phase === 'サポートコンテンツ' ? 'サポートコンテンツ'
        : step.phase === '卒業テスト' ? '卒業テスト'
        : '';
      if (phaseLabel) html += `<div class="phase-label">${phaseLabel}</div>`;
    }

    const isDone = state.completedSteps.has(step.id);
    const isActive = i === state.currentStep;
    const cls = `nav-item${isDone ? ' done' : ''}${isActive ? ' active' : ''}`;
    const dotContent = isDone ? '✓' : (i + 1);

    html += `<div class="${cls}" onclick="goToStep(${i})">
      <div class="nav-dot">${dotContent}</div>
      <div class="nav-text">${step.navLabel}</div>
    </div>`;
  });

  nav.innerHTML = html;

  const pct = Math.round((state.completedSteps.size / (steps.length - 1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = pct + '%';
}

function renderMain() {
  const step = steps[state.currentStep];
  const content = document.getElementById('mainContent');
  document.getElementById('breadcrumb').innerHTML =
    step.phase ? `${step.phase} <span>›</span> ${step.navLabel}` : step.navLabel;

  if (step.type === 'complete') {
    content.innerHTML = `<div class="completion-card fade-in">
      <div class="completion-icon">🌸</div>
      <div class="completion-title">Basicコース 完了！</div>
      <div class="completion-body" style="margin-top:16px">
        <p>おめでとうございます！たった1ヶ月で、あなたは「自分だけのオンラインスクール」を持つオーナーになりました。</p>
        <ul style="margin:20px 0;text-align:left;line-height:2.4;padding-left:24px">
          <li>✦ 競合と被らない<strong>コンセプト</strong>が決まった（Week 1）</li>
          <li>✦ ゴールまでの<strong>全12回カリキュラム</strong>を描いた（Week 2）</li>
          <li>✦ 自信を持って提示できる<strong>価格と特典</strong>が揃った（Week 3）</li>
          <li>✦ 世界に一つだけの<strong>会員サイト</strong>を立ち上げた（Week 4）</li>
        </ul>
        <p>今のあなたは、知り合いに「私のスクール、見てみて！」と自信を持って言える状態です。</p>
        <p style="margin-top:20px;padding:16px 20px;background:linear-gradient(135deg,#FFF8F5,#FFF3EC);border-radius:12px;border-left:3px solid var(--rose);font-size:13px;line-height:1.8">
          「知らない人に広めたい」「寝ている間にお客様が集まる自動化を完成させたい」<br>そんな次のステージへ進む準備ができた方は、<strong style="color:var(--rose)">Standardコース（集客・自動化編）</strong>でお会いしましょう！
        </p>
      </div>
    </div>`;
    renderSidebar();
    return;
  }

  if (step.type === 'intro') {
    content.innerHTML = `<div class="week-intro fade-in">
      <div class="week-intro-icon">${step.icon}</div>
      <div class="week-intro-text">
        <h2>${step.title}</h2>
        <p>${step.body.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</p>
        <p style="margin-top:8px;font-size:12px;color:var(--rose)">${step.time}</p>
      </div>
    </div>
    <div style="max-width:780px">
      <button class="btn-next primary" onclick="nextStep()" style="font-size:15px;padding:16px 36px">
        ワークを始める →
      </button>
    </div>`;
    renderSidebar();
    return;
  }

  // Guide type
  if (step.type === 'guide') {
    const itemsHtml = step.guideItems.map(item => `
      <div style="display:flex;gap:16px;margin-bottom:20px;align-items:flex-start">
        <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--blush));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0">${item.step}</div>
        <div style="flex:1">
          <div style="font-size:14px;font-weight:600;color:var(--deep);margin-bottom:4px">${item.title}</div>
          <div style="font-size:13px;color:var(--muted);line-height:1.8;white-space:pre-wrap">${item.body}</div>
          ${item.link ? `<a href="${item.link.url}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--rose);text-decoration:none;border:1px solid rgba(196,133,106,0.3);padding:4px 12px;border-radius:20px;transition:all 0.2s" onmouseover="this.style.background='#FFF3ED'" onmouseout="this.style.background='transparent'">📖 ${item.link.label} →</a>` : ''}
        </div>
      </div>`).join('');

    const checksHtml = step.checkItems ? `
      <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">
        <div style="font-size:12px;font-weight:600;letter-spacing:0.08em;color:var(--rose);margin-bottom:12px;text-transform:uppercase">完了チェック</div>
        ${step.checkItems.map((item, ci) => `
          <label style="display:flex;align-items:center;gap:10px;margin-bottom:10px;cursor:pointer">
            <input type="checkbox" id="chk-${step.id}-${ci}" onchange="saveAnswer('chk-${step.id}-${ci}', this.checked)" ${state.answers['chk-'+step.id+'-'+ci] ? 'checked' : ''} style="width:16px;height:16px;accent-color:var(--rose)">
            <span style="font-size:13px;color:var(--deep)">${item}</span>
          </label>`).join('')}
      </div>` : '';

    const isFirst = state.currentStep === 0;
    const prevBtn = isFirst ? '' : `<button class="btn-prev" onclick="prevStep()">← 戻る</button>`;

    content.innerHTML = `
      <div class="step-card fade-in">
        <div class="step-header">
          <div class="step-number">${state.currentStep}</div>
          <div class="step-title-wrap">
            <div class="step-week">Week ${step.week}</div>
            <div class="step-title">${step.title}</div>
          </div>
        </div>
        <div class="step-body">
          ${itemsHtml}
          ${checksHtml}
        </div>
        <div class="step-footer">
          ${prevBtn}
          <button class="btn-next" onclick="nextStep()">次へ進む →</button>
        </div>
      </div>`;
    renderSidebar();
    return;
  }

  // Q&A type
  if (step.type === 'qa') {
    const [openIdx, setOpen] = [state.answers['__qaOpen'] || null, (v) => { state.answers['__qaOpen'] = v; }];
    let catHtml = step.categories.map((cat, ci) => {
      const itemsHtml = cat.items.map((item, ii) => {
        const key = `qa-${ci}-${ii}`;
        const isOpen = state.answers[key];
        return `<div style="border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden">
          <div onclick="toggleQA('${key}')" style="padding:14px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:${isOpen?'#FFF8F5':'#FDFCFA'}">
            <span style="font-size:13.5px;font-weight:500;color:var(--deep)">${item.q}</span>
            <span style="color:var(--rose);font-size:18px;line-height:1">${isOpen?'−':'+'}</span>
          </div>
          ${isOpen ? `<div style="padding:0 18px 16px;border-top:1px solid var(--border);background:#FDFCFA">
            <p style="font-size:13px;color:var(--muted);line-height:1.8;margin-top:12px">${item.a}</p>
            <div style="margin-top:10px;padding:10px 14px;background:linear-gradient(135deg,#EFF5F1,#F0F5F2);border-radius:8px;font-size:12px;color:#5A7A63">
              <strong>👉 次にやること：</strong>${item.next}
            </div>
          </div>` : ''}
        </div>`;
      }).join('');
      return `<div style="margin-bottom:24px">
        <div style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--rose);margin-bottom:12px">${cat.label}</div>
        ${itemsHtml}
      </div>`;
    }).join('');

    content.innerHTML = `
      <div class="step-card fade-in">
        <div class="step-header">
          <div class="step-number" style="background:linear-gradient(135deg,var(--sage),#6A8F76)">？</div>
          <div class="step-title-wrap">
            <div class="step-week" style="color:var(--sage)">サポートコンテンツ</div>
            <div class="step-title">${step.title}</div>
            <div class="step-time">あなたが止まるのは"正常"です。今の不安に近い質問を選んでください。</div>
          </div>
        </div>
        <div class="step-body">${catHtml}</div>
        <div class="step-footer">
          <button class="btn-prev" onclick="prevStep()">← 戻る</button>
          <button class="btn-next" onclick="nextStep()">次へ進む →</button>
        </div>
      </div>`;
    renderSidebar();
    return;
  }

  // Graduation check type
  if (step.type === 'graduation_check') {
    const groupsHtml = step.checkGroups.map((grp, gi) => {
      const itemsHtml = grp.items.map((item, ii) => {
        const key = `grad-chk-${gi}-${ii}`;
        const val = state.answers[key] || '⬜';
        return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <select onchange="saveAnswer('${key}', this.value)" style="border:1.5px solid var(--border);border-radius:8px;padding:4px 8px;font-size:13px;color:var(--deep);background:#FDFCFA;cursor:pointer;outline:none">
            <option ${val==='⬜'?'selected':''}>⬜</option>
            <option ${val==='✔'?'selected':''}>✔</option>
            <option ${val==='△'?'selected':''}>△</option>
            <option ${val==='✕'?'selected':''}>✕</option>
          </select>
          <span style="font-size:13px;color:var(--deep)">${item}</span>
        </div>`;
      }).join('');
      return `<div style="margin-bottom:24px">
        <div style="font-size:12px;font-weight:600;color:var(--rose);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)">${grp.label}</div>
        ${itemsHtml}
      </div>`;
    }).join('');

    content.innerHTML = `
      <div class="step-card fade-in">
        <div class="step-header">
          <div class="step-number" style="background:linear-gradient(135deg,var(--gold),#D4A855)">✓</div>
          <div class="step-title-wrap">
            <div class="step-week" style="color:var(--gold)">卒業テスト</div>
            <div class="step-title">${step.title}</div>
            <div class="step-time">✔/△/✕ で自己判定してください。✕が多少あってもOKです。</div>
          </div>
        </div>
        <div class="step-body">
          ${groupsHtml}
          <div style="padding:16px 20px;background:linear-gradient(135deg,#FFF8F5,#FFF3EC);border-radius:12px;border-left:3px solid var(--rose);font-size:13px;line-height:1.8;margin-top:8px">
            <strong style="color:var(--rose)">合格基準はたった1つ</strong><br>
            「自分で売っていい状態に到達している」こと。<br>
            コンセプトが明確・12回が揃っている・Utageに入っている。<br>
            これが揃っていれば合格です。
          </div>
        </div>
        <div class="step-footer">
          <button class="btn-prev" onclick="prevStep()">← 戻る</button>
          <button class="btn-next" onclick="nextStep()">次へ進む →</button>
        </div>
      </div>`;
    renderSidebar();
    return;
  }

  // Form / form_with_ai
  let savedDataHtml = '';
  if (step.showSavedData) {
    const FULL_DISPLAY_KEYS = ['curriculum_final'];
    const LABELS = { job: '職業', concept_final: 'コンセプト', curriculum_final: 'Week2で決めたカリキュラム' };
    const pills = step.showSavedData
      .filter(k => state.answers[k] && !FULL_DISPLAY_KEYS.includes(k))
      .map(k => {
        const label = LABELS[k] || k;
        const val = state.answers[k].length > 30 ? state.answers[k].slice(0, 30) + '…' : state.answers[k];
        return `<div class="saved-pill"><span class="pill-icon">✦</span>${label}：${val}</div>`;
      }).join('');
    const blocks = step.showSavedData
      .filter(k => state.answers[k] && FULL_DISPLAY_KEYS.includes(k))
      .map(k => {
        const label = LABELS[k] || k;
        return `<div style="width:100%"><div class="saved-block-label">✦ ${label}</div><div class="saved-block">${state.answers[k]}</div></div>`;
      }).join('');
    if (pills || blocks) savedDataHtml = `<div class="saved-data">${pills}${blocks}</div>`;
  }

  let fieldsHtml = step.fields.map(f => {
    const saved = state.answers[f.id] || '';
    const inputEl = f.type === 'textarea'
      ? `<textarea id="field-${f.id}" placeholder="${f.placeholder}" oninput="saveAnswer('${f.id}', this.value)">${saved}</textarea>`
      : `<input type="text" id="field-${f.id}" placeholder="${f.placeholder}" value="${saved}" oninput="saveAnswer('${f.id}', this.value)">`;
    return `<div class="field-group">
      <div class="field-label">${f.label} <span class="badge badge-${f.badge}">${f.badge === 'required' ? '必須' : 'ヒント'}</span></div>
      ${f.hint ? `<div class="hint-text">${f.hint}</div>` : ''}
      ${inputEl}
    </div>`;
  }).join('');

  let aiSectionHtml = '';
  if (step.aiAction) {
    const savedResponse = state.aiResponses[step.id] || '';
    aiSectionHtml = `<div class="ai-section">
      <button class="ai-trigger-btn" id="aiBtn-${step.id}" onclick="callAI('${step.id}')">
        <span class="btn-icon">✦</span> ${step.aiAction.buttonLabel}
      </button>
      <div class="ai-response-wrap ${savedResponse ? 'visible' : ''}" id="aiResp-${step.id}">
        <div class="ai-response-header">
          <div class="ai-avatar">L</div>
          Lilieのアドバイス
        </div>
        <div class="ai-response-body" id="aiRespBody-${step.id}">${savedResponse}</div>
      </div>
    </div>`;
  }

  const isFirst = state.currentStep === 0;
  const prevBtn = isFirst ? '' : `<button class="btn-prev" onclick="prevStep()">← 戻る</button>`;

  content.innerHTML = `
    <div class="step-card fade-in">
      <div class="step-header">
        <div class="step-number">${state.currentStep}</div>
        <div class="step-title-wrap">
          <div class="step-week">Week ${step.week}</div>
          <div class="step-title">${step.title}</div>
          ${step.time ? `<div class="step-time">${step.time}</div>` : ''}
        </div>
      </div>
      <div class="step-body">
        ${savedDataHtml}
        ${step.purpose ? `<div class="purpose-box"><p>${step.purpose.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</p></div>` : ''}
        ${step.guideLink ? `<a href="${step.guideLink.url}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;margin-bottom:20px;font-size:12px;color:var(--rose);text-decoration:none;border:1px solid rgba(196,133,106,0.3);padding:6px 14px;border-radius:20px">📖 ${step.guideLink.label} →</a>` : ''}
        ${fieldsHtml}
        ${aiSectionHtml}
      </div>
      <div class="step-footer">
        ${prevBtn}
        <button class="btn-next" onclick="nextStep()">次へ進む →</button>
      </div>
    </div>`;

  renderSidebar();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// NAVIGATION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function goToStep(i) {
  requireAuth(i, () => {
    state.currentStep = i;
    renderMain();
    document.querySelector('.main').scrollTop = 0;
    window.scrollTo(0, 0);
  });
}

function nextStep() {
  const next = state.currentStep + 1;
  requireAuth(next, () => {
    state.completedSteps.add(steps[state.currentStep].id);
    if (state.currentStep < steps.length - 1) {
      state.currentStep = next;
      saveToStorage();
      renderMain();
      window.scrollTo(0, 0);
    }
  });
}

function prevStep() {
  if (state.currentStep > 0) {
    state.currentStep--;
    renderMain();
    window.scrollTo(0, 0);
  }
}

function saveToStorage() {
  localStorage.setItem('lilie_state', JSON.stringify({
    currentStep: state.currentStep,
    answers: state.answers,
    aiResponses: state.aiResponses,
    completedSteps: [...state.completedSteps]
  }));
}

function saveAnswer(id, val) {
  state.answers[id] = val;
  saveToStorage();
}

function toggleQA(key) {
  state.answers[key] = !state.answers[key];
  saveToStorage();
  renderMain();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AI CALL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function callAI(stepId) {
  const step = steps.find(s => s.id === stepId);
  if (!step || !step.aiAction) return;

  const btn = document.getElementById(`aiBtn-${stepId}`);
  const respWrap = document.getElementById(`aiResp-${stepId}`);
  const respBody = document.getElementById(`aiRespBody-${stepId}`);

  btn.disabled = true;
  btn.innerHTML = '<span class="btn-icon">✦</span> 考えています...';
  respWrap.classList.add('visible');
  respBody.innerHTML = `<div class="typing-indicator">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>`;

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: step.aiAction.systemPrompt(state.answers),
        messages: [{ role: 'user', content: step.aiAction.userPrompt(state.answers) }]
      })
    });

    const data = await response.json();
    const text = data.content?.[0]?.text || 'エラーが発生しました。もう一度お試しください。';
    state.aiResponses[stepId] = text;
    respBody.textContent = text;
  } catch (e) {
    respBody.textContent = 'エラーが発生しました。ネットワーク接続を確認してもう一度お試しください。';
  }

  btn.disabled = false;
  btn.innerHTML = `<span class="btn-icon">✦</span> もう一度生成する`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function restoreAndRender(s) {
  state.currentStep = s.currentStep || 0;
  state.answers = s.answers || {};
  state.aiResponses = s.aiResponses || {};
  state.completedSteps = new Set(s.completedSteps || []);
  renderMain();
}

function showResumeModal(s) {
  const overlay = document.createElement('div');
  overlay.className = 'resume-overlay';
  overlay.innerHTML = `
    <div class="resume-modal">
      <h2>おかえりなさい</h2>
      <p>前回の入力内容が保存されています。<br>続きから再開しますか？</p>
      <div class="btn-row">
        <button class="btn-resume" id="resumeBtn">続きから再開する</button>
        <button class="btn-restart" id="restartBtn">最初からやり直す</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  document.getElementById('resumeBtn').addEventListener('click', () => {
    overlay.remove();
    restoreAndRender(s);
  });
  document.getElementById('restartBtn').addEventListener('click', () => {
    localStorage.removeItem('lilie_state');
    overlay.remove();
    renderMain();
  });
}

const saved = localStorage.getItem('lilie_state');
if (saved) {
  try {
    const s = JSON.parse(saved);
    const hasProgress = s.currentStep > 0 || Object.keys(s.answers || {}).length > 0;
    if (hasProgress) {
      renderMain();
      showResumeModal(s);
    } else {
      renderMain();
    }
  } catch (e) {
    renderMain();
  }
} else {
  renderMain();
}
</script>
</body>
</html>
